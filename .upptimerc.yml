# Upptime (https://upptime.js.org) — VibeCheck platform status page.
# Whoops IMP7 O3: public uptime + incident history, hosted OFF our own infra
# (GitHub Actions pings + GitHub Pages) so it stays up when we are down.
# URLs only — no code, no PHI, nothing proprietary lives in this repo.

owner: matthewsextonlcsw-sudo
repo: status

sites:
  - name: VibeCheck app
    url: https://app.vibecheck.luxury/api/health
  - name: VibeCheck EMR
    url: https://emr.vibecheck.luxury/healthz
  - name: vibecheck.luxury (marketing)
    url: https://vibecheck.luxury

status-website:
  cname: status.vibecheck.luxury
  logoUrl: https://vibecheck.luxury/favicon.ico
  name: VibeCheck Status
  introTitle: "**VibeCheck** platform status"
  introMessage: Live uptime and incident history for the VibeCheck app, the EMR, and the marketing site. Checked every 5 minutes from GitHub's infrastructure.
  navbar:
    - title: Status
      href: /
    - title: vibecheck.luxury
      href: https://vibecheck.luxury

# Solo operator: no issue assignees (the SNS/email page is the wake-up channel).
assignees: []
commitMessages:
  commitAuthorName: upptime-bot
  commitAuthorEmail: hello@vibecheck.luxury
